# VoltEdge MVP CI/CD Pipeline
# Builds the Python app and deploys it to Azure Web App on every push to main.
# Database tables are created automatically at app startup (init_db() in database.py).

name: Deploy VoltEdge MVP to Azure Web App

on:
  # Automatically deploy when code is merged to main
  push:
    branches: [main]
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  # ── Build job: install dependencies and prepare artifact ──
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

  # ── Deploy job: publish artifact to Azure Web App ──
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'voltedge-app'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B92328D97C9D4F999C75988338CC8360 }}
